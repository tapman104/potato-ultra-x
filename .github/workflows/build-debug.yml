name: Build Debug APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS objects
        run: git lfs pull

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: potato-player-arm64-v8a
          path: app/build/outputs/apk/debug/*arm64*.apk
          retention-days: 7

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: potato-player-armeabi-v7a
          path: app/build/outputs/apk/debug/*armeabi*.apk
          retention-days: 7

      - name: Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: potato-player-x86_64
          path: app/build/outputs/apk/debug/*x86_64*.apk
          retention-days: 7

      - name: Upload x86
        uses: actions/upload-artifact@v4
        with:
          name: potato-player-x86
          path: app/build/outputs/apk/debug/*x86-*.apk
          retention-days: 7
